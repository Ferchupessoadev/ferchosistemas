services:
  app:
    build:
      target: prod # stage optimizado
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  nginx:
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - certbot_certs:/etc/letsencrypt # SSL

  mysql:
    restart: unless-stopped

  redis:
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}

  # Worker para queues
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3
    networks:
      - laravel_net
    depends_on:
      - mysql
      - redis

  # Scheduler (reemplaza cron)
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: prod
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    networks:
      - laravel_net

volumes:
  certbot_certs:
